name: task-1

on:
  push:
    branches:
      - main

jobs:
  job-a:
    runs-on: ubuntu-latest
    outputs:
      sum: ${{ steps.num.info.sum}}
    steps:
      - id: info 
        run: echo "sum=10" >> $GITHUB_OUTPUT

  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - run: echo "The sum in ${{ needs.job-a.outputs.sum}}"
