name: example-1

on:
  push:
    branches: [main]


jobs:
  job-a:
    runs-on: ubuntu-latest
    outputs:
      country: ${{ steps.pick-country.outputs.country}}
      city: ${{ steps.pick-city.outputs.city-name }}
    steps:
      - id: pick-city 
        run: echo "city-name=Tel Aviv" >> $GITHUB_OUTPUT
      - id: pick-country   
        run: echo "country=Israel" >> $GITHUB_OUTPUT

  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - run: echo "The city is ${{ needs.job-a.outputs.city}}, locate in ${{ needs.job-a.outputs.country }}"

