name: example-1

on:
  push:
    branches: [main]


jobs:
  job-a:
    runs-on: ubuntu-latest
    outputs:
      city: ${{ steps.pick-city.outputs.city-name }}
    steps:
      - id: pick-city 
        run: echo "city-name=Tel Aviv" >> $GITHUB_OUTPUT

  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - run: echo "The city is ${{ need.job-a.outputs.city }}"

