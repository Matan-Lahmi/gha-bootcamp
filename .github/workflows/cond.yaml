name: task1

on:
  push:
    branches:
      - main
    
jobs:
  job-a:
    strategy:
      matrix:
        env: ["dev","prod"]
        region: ["us","eu"]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying to ${{ matrix.env }} in ${{ matrix.region }}"

  job-b:
    needs: job-a
    if: matrix.env == 'prod' && matrix.region == 'eu'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying to prod/eu"


