name: task1

on:
  push:
    branches:
      - main

jobs:
  job-a:
    runs-on: ubuntu-latest
    outputs:
      my-name: ${{ steps.info.outputs.name }}
    steps:
      - id: info 
        run: echo "name=matan" >> $GITHUB_OUTPUT
  
  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - run: echo "My name is ${{ needs.job-a.outputs.my-name }}"

