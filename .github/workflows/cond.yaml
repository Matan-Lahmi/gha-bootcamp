name: task3

on:
  push:
    branches:
      - main 

jobs:
  job-a:
    if: github.event-name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DB_USER: "admin"
      DB_PASS: "123"
    steps:
      - name: db login info
        run: echo "The DB pass is ${{ env.DB_PASS }} and the user ${{ env.DB_USER }}"
      - name: prof the env in second steps
        run: echo "${{ env.DB_PASS}} ${{ env.DB_USER}}"
