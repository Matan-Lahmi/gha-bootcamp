name: task3

on:
  push:
    branches:
      - main 

jobs:
  job-a:
    strategy:
      matrix:
        env: ["dev","staging","prod"]
    runs-on: ubuntu-latest
    outputs:
      env-print: ${{ steps.info.outputs.env-name}}
    steps:
      - id: info 
        run: echo " env-name=${{ matrix.env}}" >> $GITHUB_OUTPUT
      
  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - run: echo "The winner is ${{ needs.job-a.outputs.env-print }}"
