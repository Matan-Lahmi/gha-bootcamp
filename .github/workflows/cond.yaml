name: task1

on:
  push:
    branches:
      - main 

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This Hello is from job-a" > myfile.txt
      - uses: actions/upload-artifact@v4
        with: 
          name: myfile
          path: myfile.txt

  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: myfile
      - run: cat myfile.txt
