name: task1

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'the environment to deploy'
        required: true
        default: 'dev'
      version:
        description: 'the version you whant to deploy'
        required: true
        default: '1.0.0'

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying version "${{ github.event.input.version }}" to "${{ github.event.input.environment }}""
