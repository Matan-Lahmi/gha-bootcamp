name: task1

on:
  push:
    branches:
      - main

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello from job-a" > job-a.txt
      - uses: actions/upload-artifact@v4
        with:
          name: job-a
          path: job-a.txt
    
  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: job-a
      - run: cat job-a.txt

  
