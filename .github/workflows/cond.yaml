name: task1

on:
  push:
    branches:
      - main

jobs:
  job-a:
    strategy:
      matrix:
        env: ["prod","dev","staging"]
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ matrix.env }}"

  job-b:
    needs: job-a
    if: matrix.env == 'prod'
    runs-on: ubuntu-latest
    steps:
      - run: echo "This is prod environment"
  
