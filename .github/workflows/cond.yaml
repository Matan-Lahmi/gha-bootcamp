name: task 4

on:
  push:
    branches:
      - main 

jobs:
  job-a:
    runs-on: ubuntu-latest
    outputs:
      image-id: ${{ steps.build.outputd.id }}
    steps:
      - uses: actions/checkout@v4
      - id: build
        run: |
          docker build -t test-image .
          echo "id=$(docker images -q test-image)" >> $GITHUB_OUTPUT

  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - run: echo "The image ID from job-a is ${{ needs.job-a.outputs.image-id }}"
