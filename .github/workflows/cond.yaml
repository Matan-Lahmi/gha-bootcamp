name: task1

on:
  push:
    branches:
      - main
    
jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - run: mkdir mydir
      - working-directory: mydir
        run: |
          echo "Hello from file 1" > file1.txt
          echo "Hello from file 2" > file2.txt
      - uses: actions/upload-artifact@v7
        with:
          name: my_artifact
          path: mydir

  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with: 
          name: my_artifact
      - working-directory: mydir
        run: cat file1.txt && cat file2.txt      



