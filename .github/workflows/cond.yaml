name: task1

on:
  push:
    branches:
      - main

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            myimage:${{ github.sha }}
            myimage:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max


