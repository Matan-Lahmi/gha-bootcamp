name: task3 

on:
  push:
    branches:
      - main 

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - run: mkdir mydir && echo "a" > mydir/a.txt && echo "b" > mydir/b.txt
      - uses: actions/upload-artifact@v4
        with:
          name: my-files
          path: mydir
  job-b:
    needs: job-a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: my-files
      - run: cat a.txt b.txt
