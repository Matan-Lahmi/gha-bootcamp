name: task1

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'the environment to deploy'
        type: choice
        required: true
        default: 'dev'
        options:
          - dev
          - staging
          - prod

jobs:
  job-a:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying to ${{ github.event.inputs.environment }}"
